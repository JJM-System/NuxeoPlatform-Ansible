---
# Creates each user defined in the system_users list. system: false means
# these are regular (non-system) users with UIDs in the normal range.
# Using loop_control.label shows only the username in Ansible output instead
# of the full dict, keeping logs readable when the list is long.
- name: users | create system users
  ansible.builtin.user:
    name: "{{ item.name }}"
    groups: "{{ item.groups | default(omit) }}"
    shell: "{{ item.shell | default('/bin/bash') }}"
    create_home: true
    state: present
    system: false
  loop: "{{ system_users }}"
  loop_control:
    label: "{{ item.name }}"
  tags: [common, users]

# Writes a sudoers drop-in file to /etc/sudoers.d/<username> granting the user
# full NOPASSWD sudo. Only applied when 'sudo' appears in the user's groups field.
# validate: visudo -cf ensures the file is syntactically valid before it is
# written — a broken sudoers file can permanently lock out privileged access.
# mode: 0440 is required by sudo (it refuses world-readable sudoers files).
- name: users | set sudo NOPASSWD for ansible user
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ item.name }}"
    content: "{{ item.name }} ALL=(ALL) NOPASSWD:ALL\n"
    owner: root
    group: root
    mode: "0440"
    validate: /usr/sbin/visudo -cf %s
  loop: "{{ system_users }}"
  loop_control:
    label: "{{ item.name }}"
  when: "'sudo' in (item.groups | default(''))"
  tags: [common, users]

# Adds each public key listed under authorized_keys for each user.
# subelements flattens the user→keys relationship into individual pairs.
# skip_missing=True means users without an authorized_keys list are silently
# skipped rather than failing. exclusive: false preserves any pre-existing
# keys (e.g. the Vagrant insecure key) so SSH access is not broken mid-play.
- name: users | deploy authorized_keys
  ansible.posix.authorized_key:
    user: "{{ item.0.name }}"
    key: "{{ item.1 }}"
    state: present
    exclusive: false
  loop: "{{ system_users | subelements('authorized_keys', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }}"
  tags: [common, users]
