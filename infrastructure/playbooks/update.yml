---
# Rolling update playbook — updates services in dependency order without downtime
# Usage:
#   ansible-playbook playbooks/update.yml -i inventories/production/hosts.ini
#   ansible-playbook playbooks/update.yml -i inventories/production/hosts.ini --tags nuxeo

# ── OS baseline (all nodes, serial=1) ─────────────────────────────────────────
- hosts: all_nodes
  gather_facts: true
  become: true
  serial: 1
  tags: [common]
  pre_tasks:
    - name: update | starting common OS update
      ansible.builtin.debug:
        msg: "Starting common rolling update on {{ inventory_hostname }}"
  roles:
    - role: common
  post_tasks:
    - name: update | common health check
      ansible.builtin.import_tasks: "{{ playbook_dir }}/../roles/common/tasks/health_check.yml"
      tags: [common, health_check]

# ── etcd (db_nodes, serial=1) ─────────────────────────────────────────────────
