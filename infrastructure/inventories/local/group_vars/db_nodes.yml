---
# ── Elasticsearch ──────────────────────────────────────────────────────────────
elasticsearch_heap_size: "512m"        # small for Vagrant (production: 4g+)
elasticsearch_cluster_name: nuxeo-es-cluster-local
elasticsearch_data_dir: /var/lib/elasticsearch
elasticsearch_version: "8.x"

# ── Kafka ──────────────────────────────────────────────────────────────────────
kafka_data_dir: /var/lib/kafka
kafka_log_retention_hours: 168
kafka_replication_factor: 3
kafka_min_insync_replicas: 2
kafka_heap_opts: "-Xmx512m -Xms512m"  # small for Vagrant

# ── PostgreSQL / Patroni ───────────────────────────────────────────────────────
postgresql_version: "16"
postgresql_data_dir: /var/lib/postgresql/16/main
patroni_scope: nuxeo-patroni-local

# ── etcd ───────────────────────────────────────────────────────────────────────
etcd_data_dir: /var/lib/etcd
etcd_cluster_name: nuxeo-etcd-cluster-local
